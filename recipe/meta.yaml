{% set name = "datamatrix" %}
{% set pypiname = name %}
{% set version = "1.0.16" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ pypiname[0] }}/{{ pypiname }}/{{ pypiname }}-{{ version }}.tar.gz
  sha256: c54f20e3967ca5e1930783a38265b2bb484c970d51284bc9e57a3419c5a169f1

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps -vv
  number: 0

requirements:
  host:
    - pip
    - python {{ python_min }}
    - flit-core
  run:
    - python >={{ python_min }}
    - openpyxl
    - fastnumbers
    - prettytable

test:
  imports:
    - datamatrix
    - datamatrix._datamatrix
    - datamatrix.io
    - datamatrix.convert
    - datamatrix.operations
    - datamatrix.series
    - datamatrix.functional
  requires:
    - numpy
    - scipy
    - python {{ python_min }}

about:
  home: https://github.com/open-cogsci/datamatrix
  license: GPL-2.0-or-later
  license_family: GPL
  license_file: LICENSE
  summary: An intuitive, Pythonic way to work with tabular data
  doc_url: https://pydatamatrix.eu
  dev_url: https://github.com/open-cogsci/datamatrix

extra:
  recipe-maintainers:
    - dschreij
    - smathot
